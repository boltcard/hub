name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/card

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: docker/card/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o app

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/card/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docker/card/admin-ui/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [build, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(grep -oP 'Version string = "\K[0-9]+\.[0-9]+\.[0-9]+' docker/card/build/build.go)" >> "$GITHUB_OUTPUT"

      - name: Build card image
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: docker build --build-arg APP_VERSION="$APP_VERSION" -t boltcard/card:latest docker/card

      - name: Build webproxy image
        run: docker build -t boltcard/webproxy:latest docker/webproxy

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push card image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push boltcard/card:latest

      - name: Push webproxy image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push boltcard/webproxy:latest

  release:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub Release on version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V=$(grep -oP 'Version string = "\K[0-9]+\.[0-9]+\.[0-9]+' docker/card/build/build.go)
          echo "Version in build.go: $V"

          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "Tag v$V already exists — nothing to release."
            exit 0
          fi

          PREV=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          echo "Previous release tag: ${PREV:-(none)}"
          if [ -n "$PREV" ]; then
            RANGE="$PREV..HEAD"
          else
            RANGE="HEAD"
          fi

          # Tidied notes: non-merge commit subjects, with version-bump,
          # docs:, and chore: lines dropped (incl. conventional-commit scopes).
          mapfile -t SUBJECTS < <(git log --no-merges --pretty=format:'%s' $RANGE \
            | grep -viE '^(bump|chore: ?bump).*version|^version bump|^bump to v?[0-9]|^docs(\(|:)|^chore(\(|:)' || true)

          TOTAL=${#SUBJECTS[@]}
          LIMIT=30
          BODY=""
          COUNT=0
          for s in "${SUBJECTS[@]}"; do
            [ "$COUNT" -ge "$LIMIT" ] && break
            BODY+="- $s"$'\n'
            COUNT=$((COUNT + 1))
          done
          if [ "$TOTAL" -gt "$LIMIT" ]; then
            REMAIN=$((TOTAL - LIMIT))
            BODY+=$'\n'"…and $REMAIN earlier commits."$'\n'
            if [ -n "$PREV" ]; then
              BODY+=$'\n'"Full changelog: https://github.com/boltcard/hub/compare/$PREV...v$V"$'\n'
            fi
          fi
          if [ -z "$BODY" ]; then
            BODY="Release v$V"
          fi

          echo "----- release notes -----"
          printf '%s\n' "$BODY"
          echo "-------------------------"

          gh release create "v$V" --target "$GITHUB_SHA" --title "v$V" --notes "$BODY"
