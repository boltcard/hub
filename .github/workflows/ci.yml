name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/card

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: docker/card/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o app

      - name: Test
        run: go test -race -count=1 ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docker/card/admin-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: docker/card/admin-ui/package-lock.json
      - run: npm ci
      - run: npm run build

  # Card image: depends on the Go + frontend gates. Cached layers (go mod
  # download, npm ci, apt) are reused across runs via the GHA cache backend,
  # so a typical PR only recompiles changed Go/frontend source.
  docker-card:
    runs-on: ubuntu-latest
    needs: [build, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(grep -oP 'Version string = "\K[0-9]+\.[0-9]+\.[0-9]+' docker/card/build/build.go)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push card image
        uses: docker/build-push-action@v6
        with:
          context: docker/card
          build-args: APP_VERSION=${{ steps.version.outputs.version }}
          tags: boltcard/card:latest
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-from: type=gha,scope=card
          cache-to: type=gha,mode=max,scope=card
          # Publish a single-platform manifest, not an OCI image index. Provenance
          # attestations (on by default) wrap the image in an index with no
          # top-level config, which the version check in already-deployed hubs
          # (<=0.22.3) cannot parse — leaving their "Update available" button stuck.
          # Keeping this false is what lets existing installs see the update button.
          # See issue #45.
          provenance: false

  # Webproxy image: pure Caddy (xcaddy compiles the ratelimit plugin), so it
  # depends on neither Go nor frontend — no `needs:`, runs in parallel from t=0.
  # The expensive xcaddy build is a cache hit whenever docker/webproxy is unchanged.
  docker-webproxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push webproxy image
        uses: docker/build-push-action@v6
        with:
          context: docker/webproxy
          tags: boltcard/webproxy:latest
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-from: type=gha,scope=webproxy
          cache-to: type=gha,mode=max,scope=webproxy
          # Single-platform manifest (no provenance index), for consistency with
          # the card image. See issue #45.
          provenance: false

  release:
    runs-on: ubuntu-latest
    needs: [docker-card, docker-webproxy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish GitHub Release on version bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V=$(grep -oP 'Version string = "\K[0-9]+\.[0-9]+\.[0-9]+' docker/card/build/build.go)
          echo "Version in build.go: $V"

          if git rev-parse -q --verify "refs/tags/v$V" >/dev/null; then
            echo "Tag v$V already exists — nothing to release."
            exit 0
          fi

          PREV=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          echo "Previous release tag: ${PREV:-(none)}"
          if [ -n "$PREV" ]; then
            RANGE="$PREV..HEAD"
          else
            RANGE="HEAD"
          fi

          # Tidied notes: non-merge commit subjects, with version-bump,
          # docs:, and chore: lines dropped (incl. conventional-commit scopes).
          mapfile -t SUBJECTS < <(git log --no-merges --pretty=format:'%s' $RANGE \
            | grep -viE '^(bump|chore: ?bump).*version|^version bump|^bump to v?[0-9]|^docs(\(|:)|^chore(\(|:)' || true)

          TOTAL=${#SUBJECTS[@]}
          LIMIT=30
          BODY=""
          COUNT=0
          for s in "${SUBJECTS[@]}"; do
            [ "$COUNT" -ge "$LIMIT" ] && break
            BODY+="- $s"$'\n'
            COUNT=$((COUNT + 1))
          done
          if [ "$TOTAL" -gt "$LIMIT" ]; then
            REMAIN=$((TOTAL - LIMIT))
            BODY+=$'\n'"…and $REMAIN earlier commits."$'\n'
            if [ -n "$PREV" ]; then
              BODY+=$'\n'"Full changelog: https://github.com/boltcard/hub/compare/$PREV...v$V"$'\n'
            fi
          fi
          if [ -z "$BODY" ]; then
            BODY="Release v$V"
          fi

          echo "----- release notes -----"
          printf '%s\n' "$BODY"
          echo "-------------------------"

          gh release create "v$V" --target "$GITHUB_SHA" --title "v$V" --notes "$BODY"
