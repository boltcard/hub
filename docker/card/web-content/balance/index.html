<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Balance — Bolt Card Hub</title>
    <style>
        :root {
            --bg: #fff;
            --text: #212121;
            --accent: #f7931a;
            --accent-hover: #e8850f;
            --border: #e0e0e0;
            --muted: #898EA4;
            --success: #2e7d32;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1a1a;
                --text: #e0e0e0;
                --border: #333;
                --muted: #888;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: grid;
            grid-template-columns: 1fr min(32rem, 92%) 1fr;
            min-height: 100vh;
        }
        body > * { grid-column: 2; }
        header {
            grid-column: 1 / -1;
            background: var(--accent);
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        header h1 { font-size: 1.3rem; font-weight: 600; }
        main { padding: 2rem 0; }
        .scan-area {
            text-align: center;
            padding: 2rem 0;
        }
        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            min-width: 14rem;
        }
        button:hover:not(:disabled) { background: var(--accent-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .balance {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            padding: 1.5rem 0 0.5rem;
            font-variant-numeric: tabular-nums;
        }
        .balance-label {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            border-bottom: 2px solid var(--border);
            color: var(--muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        th.num, td.num { text-align: right; }
        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }
        tr:last-child td { border-bottom: none; }
        .positive { color: var(--success); }
        .no-nfc {
            color: var(--muted);
            text-align: center;
            padding: 1rem 0;
        }
        #results { display: none; }
        footer {
            padding: 2rem 0 1rem;
            text-align: center;
            font-size: 0.85rem;
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>Card Balance</h1>
    </header>
    <main>
        <div class="scan-area">
            <button id="scanButton" disabled>Scan Card</button>
            <p class="no-nfc" id="no-nfc" style="display:none">NFC is not available in this browser.</p>
        </div>
        <div id="results"></div>
    </main>
    <footer>
        <a href="/">Bolt Card Hub</a>
    </footer>

    <script type="module" src="/public/balance.js"></script>
</body>
</html>
